<!DOCTYPE html>
<html lang="it">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rotazioni della pallavolo - ricezione a 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/snap.svg-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/vbRotations.js"></script>
    <script type="text/javascript">
      var svgMaker;

      function clean(elem) {
        while (elem.firstChild) {
            elem.removeChild(elem.firstChild);
        }
      }

      function handleError(msg) {
        console.error(msg);
      }

      function go() {
        var svgDiv = document.getElementById('diagram');
        clean(svgDiv);
        svgMaker = new monkeysppp.vbRotations.SVGMaker();
        svgMaker.setErrorHandler(handleError);
        var options;
        var svgRoot = svgMaker.createSVG(options);
        svgDiv.appendChild(svgRoot);
        svgMaker.draw();
      }

      window.onload = function () {
        go();
      }

      function setAppRotation(pos) {
        if(svgMaker && svgMaker.setRotation) {
            svgMaker.setRotation(pos);
            updateActiveRotation(pos);
        }
      }

      function setAppAction(actionType, actionDetail) {
        if(svgMaker && svgMaker.setAction) {
            svgMaker.setAction(actionType, actionDetail);
            updateActiveAction(actionType, actionDetail);
        }
      }

      function updateActiveRotation(pos) {
        document.querySelectorAll('.rot-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rot-btn-' + pos).classList.add('active');
      }

      function updateActiveAction(type, detail) {
        document.querySelectorAll('.act-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('act-btn-' + type.toLowerCase() + '-' + detail.toLowerCase()).classList.add('active');
        
        // Save state for screenshot name
        window.currentActionState = type + '_' + detail;
      }

      function exportScreenshot() {
          const diagramContainer = document.getElementById('diagram-container');
          
          html2canvas(diagramContainer, {
              backgroundColor: null,
              scale: 2 // Higher resolution
          }).then(canvas => {
              const link = document.createElement('a');
              
              var rotText = "P" + (svgMaker.setterAt || "1");
              var stateText = window.currentActionState || "Servizio_Base";
              
              link.download = `SchemaVolley_${rotText}_${stateText}.png`;
              link.href = canvas.toDataURL('image/png');
              link.click();
          });
      }

    </script>
  </head>
  <body>
    <header class="app-header">
      <h1>Rotazioni Pallavolo</h1>
      <h3>Ricezione a 3 ricettori</h3>
      <button class="btn export-btn" onclick="exportScreenshot()" style="margin-top: 10px; background-color: #48bb78; color: white;">📸 Esporta Campo (PNG)</button>
    </header>

    <main class="app-container">
      
      <!-- Sezione Rotazioni (P1 - P6) -->
      <section class="controls-panel left-panel">
        <div class="control-group">
          <h4>Rotazione (Palleggiatore)</h4>
          <div class="rotation-grid">
            <button class="btn rot-btn" id="rot-btn-2" onclick="setAppRotation(2)">P2</button>
            <button class="btn rot-btn" id="rot-btn-1" onclick="setAppRotation(1)">P1</button>
            <button class="btn rot-btn" id="rot-btn-6" onclick="setAppRotation(6)">P6</button>
            <button class="btn rot-btn" id="rot-btn-5" onclick="setAppRotation(5)">P5</button>
            <button class="btn rot-btn" id="rot-btn-4" onclick="setAppRotation(4)">P4</button>
            <button class="btn rot-btn" id="rot-btn-3" onclick="setAppRotation(3)">P3</button>
          </div>
        </div>
      </section>

      <!-- Il campo (SVG) -->
      <section class="court-panel">
        <div id="diagram-container">
          <div id="diagram"></div>
          <input type="text" id="inline-editor" style="display: none; position: absolute; text-align: center; border: 2px solid #65b6df; border-radius: 4px; box-shadow: 0 0 5px rgba(101,182,223,0.5); padding: 2px; font-weight: bold; z-index: 100;">
        </div>
      </section>

      <!-- Sezione Azioni (Servizio/Ricezione) -->
      <section class="controls-panel right-panel">
        <div class="control-group">
          <h4>Fase di Gioco</h4>
          
          <div class="action-subsection">
            <h5>Servizio</h5>
            <div class="action-grid">
              <button class="btn act-btn" id="act-btn-serve-base" onclick="setAppAction('Serve', 'Base')">Base</button>
              <button class="btn act-btn" id="act-btn-serve-serve" onclick="setAppAction('Serve', 'Serve')">Servizio</button>
              <button class="btn act-btn" id="act-btn-serve-switch" onclick="setAppAction('Serve', 'Switch')">Cambio</button>
            </div>
          </div>

          <div class="action-subsection">
            <h5>Ricezione</h5>
            <div class="action-grid">
              <button class="btn act-btn" id="act-btn-receive-base" onclick="setAppAction('Receive', 'Base')">Base</button>
              <button class="btn act-btn" id="act-btn-receive-receive" onclick="setAppAction('Receive', 'Receive')">Ricez.</button>
              <button class="btn act-btn" id="act-btn-receive-set" onclick="setAppAction('Receive', 'Set')">Alzata</button>
              <button class="btn act-btn" id="act-btn-receive-hit" onclick="setAppAction('Receive', 'Hit')">Attacco</button>
              <button class="btn act-btn" id="act-btn-receive-switch" onclick="setAppAction('Receive', 'Switch')">Cambio</button>
            </div>
          </div>

          <div class="action-subsection">
            <h5>Difesa (Muro)</h5>
            <div class="action-grid">
              <button class="btn act-btn" id="act-btn-defense-defense4" onclick="setAppAction('Defense', 'Defense4')">Da Zona 4</button>
              <button class="btn act-btn" id="act-btn-defense-defensecenter" onclick="setAppAction('Defense', 'DefenseCenter')">Da Centro</button>
              <button class="btn act-btn" id="act-btn-defense-defense2" onclick="setAppAction('Defense', 'Defense2')">Da Zona 2</button>
            </div>
          </div>

        </div>
      </section>

    </main>

    <footer class="app-footer">
      <p><strong>Note:</strong> il centrale di seconda linea va sostituito con il libero.</p>
      <p>Based on <a href="https://github.com/monkeysppp/VBRotations" target="_blank">VBRotations</a> by Andy Edwards.</p>
    </footer>

  </body>
</html>
